<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>{{ course_title or "Certificate" }}</title>
    <style>{{ assets_css | default('', true) }}</style>
</head>
<body>
    {% if assets and assets.logo %}
      <img src="{{ assets.logo }}" alt="logo" style="max-height:100px;" />
    {% endif %}

    <h1>{{ course_title or "Certificate" }}</h1>
    <p><strong>Recipient:</strong> {{ recipient_name or "-" }}</p>
    <p><strong>Completion date:</strong> {{ completion_date or "-" }}</p>
    <p><strong>Issuer:</strong> {{ issuer_name or "-" }}</p>
    <p><strong>Certificate number:</strong> {{ certificate_number or "-" }}</p>
</body>
</html>
